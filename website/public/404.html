<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Vältgeist</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="/favicon.png" />
<meta name="theme-color" content="#121310" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)" />
<script src="/theme-init.js"></script>
<style>
:root{--paper:#f4f1ea;--ink:#17150f;--ink-60:rgba(23,21,15,.62);--hairline:rgba(23,21,15,.18);--signal:#e8490f}
:root[data-theme='dark']{--paper:#121310;--ink:#e6e1d4;--ink-60:rgba(230,225,212,.62);--hairline:rgba(230,225,212,.16);--signal:#ff5a1f}
@media(prefers-color-scheme:dark){:root:not([data-theme='light']){--paper:#121310;--ink:#e6e1d4;--ink-60:rgba(230,225,212,.62);--hairline:rgba(230,225,212,.16);--signal:#ff5a1f}}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper);color:var(--ink);font-family:ui-monospace,'IBM Plex Mono','SF Mono',Menlo,monospace;padding:24px}
.box{max-width:460px;text-align:left}
.code{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--signal);margin:0 0 14px}
h1{font-size:clamp(28px,7vw,40px);margin:0 0 12px;font-weight:400;line-height:1.1}
p{color:var(--ink-60);line-height:1.55;margin:0 0 22px;font-size:14px}
a{display:inline-block;color:var(--ink);text-decoration:none;border:1px solid var(--hairline);padding:11px 16px;font-size:13px;letter-spacing:.04em;text-transform:uppercase}
a:hover{border-color:var(--signal);color:var(--signal)}
</style>
</head>
<body>
<div class="box">
  <p class="code">HTTP 404 · DOC. NOT FOUND</p>
  <h1>No pod here.</h1>
  <p>This page doesn't exist — or never did. Everything real lives back at the desk.</p>
  <a href="/">← valtgeist.trade</a>
</div>
</body>
</html>
